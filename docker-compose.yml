services:
  freebies-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freebies-agent
    restart: always
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
    environment:
      - SQLITE_PATH=/app/data/deals.db
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import pathlib; p=pathlib.Path('/app/agent.log'); print(p.exists())\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
