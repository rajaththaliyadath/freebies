services:
  freebies-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freebies-agent
    restart: always
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
    environment:
      - SQLITE_PATH=/app/data/deals.db
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import pathlib; p=pathlib.Path('/app/agent.log'); print(p.exists())\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - command-center

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - command-center

networks:
  command-center:
    name: command-center
