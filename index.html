<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Freebies Hub</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: #000;
      }
      .panel {
        background: rgba(10, 10, 10, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
      }
      .nav-link {
        color: #d4d4d8;
        transition: color 180ms ease;
      }
      .nav-link:hover {
        color: #ffffff;
      }
      .hero-name {
        letter-spacing: 0.02em;
        background: linear-gradient(180deg, #fafafa 20%, #a1a1aa 80%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .arch-shell {
        width: min(100%, 440px);
        max-width: calc(100vw - 2rem);
        aspect-ratio: 3 / 3.6;
        border-radius: 220px 220px 24px 24px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: #0a0a0a;
      }
      @media (max-width: 480px) {
        .arch-shell {
          border-radius: 36% 36% 12px 12px;
        }
      }
      .editorial-line {
        border-color: rgba(255, 255, 255, 0.12);
      }
      .deal-card {
        opacity: 0;
        transform: translateY(10px);
        animation: cardIn 380ms ease forwards;
      }
      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="min-h-screen overflow-x-hidden text-zinc-100 antialiased [padding:env(safe-area-inset-top)_env(safe-area-inset-right)_env(safe-area-inset-bottom)_env(safe-area-inset-left)]">
    <div class="mx-auto min-w-0 max-w-7xl px-4 py-5 sm:px-6 sm:py-8">
      <header class="mb-6 flex flex-col gap-4 border-b border-white/10 pb-4 sm:mb-8 sm:flex-row sm:items-center sm:justify-between sm:pb-5">
        <div class="text-center text-lg font-semibold tracking-wide sm:text-left sm:text-2xl">FREEBIES HUB</div>
        <nav id="topTabs" class="flex items-center justify-center gap-6 text-base sm:justify-end sm:gap-8 sm:text-lg">
          <button type="button" data-tab="home" class="nav-link min-h-[44px] min-w-[44px] px-3 py-2 text-white">Home</button>
          <button type="button" data-tab="deals" class="nav-link min-h-[44px] min-w-[44px] px-3 py-2">Deals</button>
        </nav>
      </header>

      <section id="homePanel" class="relative flex min-h-[65vh] flex-col md:min-h-[75vh]">
        <div class="mx-auto flex w-full min-w-0 max-w-4xl flex-1 flex-col items-center px-1 text-center sm:px-2">
          <p class="mt-2 text-xl text-zinc-300 sm:mt-4 sm:text-3xl">Freebies Curator</p>
          <h1 class="hero-name mt-2 max-w-full break-words text-4xl font-bold uppercase leading-tight tracking-tight sm:mt-3 sm:text-6xl md:text-7xl">
            OZBARGAIN DEALS
          </h1>
          <div class="arch-shell mx-auto mt-6 w-full sm:mt-8">
            <img
              src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='800' height='980'%3E%3Crect width='100%25' height='100%25' fill='%23000000'/%3E%3Ctext x='50%25' y='46%25' text-anchor='middle' fill='%23a1a1aa' font-family='Inter,Arial,sans-serif' font-size='42'%3ELIVE FREEBIES%3C/text%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' fill='%23f4f4f5' font-family='Inter,Arial,sans-serif' font-size='76' font-weight='700'%3EDEALS%3C/text%3E%3C/svg%3E"
              alt="Freebies hero"
              class="h-full w-full object-cover"
            />
          </div>
        </div>

        <footer class="mt-10 flex w-full flex-col items-center justify-between gap-4 border-t border-white/10 pt-6 text-sm text-zinc-400 sm:flex-row sm:text-base md:absolute md:bottom-0 md:left-0 md:right-0 md:mt-0 md:border-0 md:pt-0">
          <span class="text-center md:text-left">hello@freebieshub.local</span>
          <div class="flex items-center gap-6 text-lg sm:gap-8">
            <span>in</span>
            <span>X</span>
            <span>ig</span>
          </div>
        </footer>
      </section>

      <section id="dealsPanel" class="hidden min-h-[65vh] md:min-h-[75vh]">
        <div class="mx-auto min-w-0 max-w-5xl px-0 sm:px-1">
          <div class="text-center">
            <p class="text-xl text-zinc-300 sm:text-3xl">Deal Explorer</p>
            <h1 class="hero-name mt-2 max-w-full break-words text-3xl font-bold uppercase leading-tight sm:text-5xl md:text-6xl">DEALS &amp; FREE</h1>
            <p id="statsText" class="mx-auto mt-4 max-w-full px-1 text-center text-[11px] leading-relaxed text-zinc-400 sm:text-sm">Loading deals...</p>
          </div>

          <div class="mt-6 border-y editorial-line py-4 sm:mt-8 sm:py-5">
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
              <input id="searchInput" type="text" placeholder="Search deals, brands, discounts…" class="min-h-[44px] w-full min-w-0 rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-base outline-none sm:text-sm" />
              <select id="sourceSelect" class="min-h-[44px] w-full min-w-0 rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-base outline-none sm:text-sm">
                <option value="ALL">Source: All</option>
                <option value="ozbargain">Source: OzBargain</option>
                <option value="studentbeans">Source: Student Beans</option>
                <option value="unidays">Source: UNiDAYS</option>
                <option value="slickdeals">Source: Slickdeals</option>
              </select>
              <select id="minVotesSelect" class="min-h-[44px] w-full min-w-0 rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-base outline-none sm:text-sm">
              <option value="0">All vote ranges</option>
              <option value="10">10+ votes</option>
              <option value="50">50+ votes</option>
              <option value="100">100+ votes</option>
              <option value="300">300+ votes</option>
              </select>
            </div>
            <div class="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
              <select id="sortSelect" class="min-h-[44px] w-full min-w-0 rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-base outline-none sm:text-sm">
              <option value="newest">Sort: New to old</option>
              <option value="oldest">Sort: Old to new</option>
              <option value="votes_desc">Sort: Votes high to low</option>
              <option value="votes_asc">Sort: Votes low to high</option>
              <option value="title_asc">Sort: Title A-Z</option>
              <option value="category_asc">Sort: Category A-Z</option>
              </select>
              <select id="locationSelect" class="min-h-[44px] w-full min-w-0 rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-base outline-none sm:text-sm">
              <option value="NSW">Location: NSW</option>
              <option value="ALL">Location: All regions</option>
              <option value="QLD">Location: QLD</option>
              <option value="VIC">Location: VIC</option>
              <option value="WA">Location: WA</option>
              <option value="SA">Location: SA</option>
              <option value="ACT">Location: ACT</option>
              <option value="TAS">Location: TAS</option>
              <option value="NT">Location: NT</option>
              </select>
              <label class="flex min-h-[44px] w-full min-w-0 cursor-pointer items-center justify-between gap-3 rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-sm sm:col-span-2 lg:col-span-1">
              <span class="min-w-0 flex-1">SVG previews only</span>
              <input id="svgOnlyToggle" type="checkbox" class="h-5 w-5 shrink-0 accent-cyan-400" />
              </label>
            </div>
          </div>

          <div id="categoryBar" class="mt-5 flex flex-wrap justify-center gap-2 sm:gap-3"></div>

          <section class="mt-8">
            <h2 class="mb-4 text-center text-base font-semibold sm:text-lg">Active deals</h2>
            <div id="dealsGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 sm:gap-6 xl:grid-cols-3"></div>
            <p id="emptyState" class="hidden rounded-xl border border-white/10 bg-white/5 p-6 text-center text-zinc-300">No deals match this category yet.</p>
            <h2 class="mb-4 mt-10 text-center text-base font-semibold text-zinc-500 sm:text-lg">Expired freebies</h2>
            <div id="expiredGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 sm:gap-6 xl:grid-cols-3"></div>
          </section>
        </div>
      </section>
    </div>

    <script>
      const state = {
        deals: [],
        selectedCategory: "All",
        minVotes: 0,
        sortBy: "newest",
        query: "",
        svgOnly: false,
        selectedLocation: "NSW",
        selectedSource: "ALL",
        scrapeStatus: {},
        activeTab: "home",
      };

      const categoryBar = document.getElementById("categoryBar");
      const dealsGrid = document.getElementById("dealsGrid");
      const emptyState = document.getElementById("emptyState");
      const statsText = document.getElementById("statsText");
      const searchInput = document.getElementById("searchInput");
      const minVotesSelect = document.getElementById("minVotesSelect");
      const sortSelect = document.getElementById("sortSelect");
      const svgOnlyToggle = document.getElementById("svgOnlyToggle");
      const locationSelect = document.getElementById("locationSelect");
      const sourceSelect = document.getElementById("sourceSelect");
      const expiredGrid = document.getElementById("expiredGrid");
      const topTabs = document.getElementById("topTabs");
      const homePanel = document.getElementById("homePanel");
      const dealsPanel = document.getElementById("dealsPanel");

      function toTitleCase(text) {
        return text.toLowerCase().split(" ").map((word) => (word ? word.charAt(0).toUpperCase() + word.slice(1) : word)).join(" ");
      }

      function formatDealTitle(deal) {
        const category = deal.category || "General";
        const raw = (deal.title || "").replace(/\s+—\s*UNiDAYS student offer\s*$/i, "").trim();
        if (deal.source === "studentbeans" || deal.source === "unidays" || deal.source === "slickdeals") {
          const short = toTitleCase(raw.slice(0, 160) || "Offer");
          return `${category}: ${short}`;
        }
        const cleaned = raw.replace(/^\[[^\]]+\]\s*/g, "").replace(/\bfree\s*[:\-]\s*/gi, "").replace(/\s+/g, " ").trim();
        const kind = deal.deal_type === "discount" ? "Deal" : "Freebie";
        return `${category} ${kind}: ${toTitleCase(cleaned || "Untitled")}`;
      }

      function sourceLabel(src) {
        if (src === "studentbeans") return "Student Beans";
        if (src === "unidays") return "UNiDAYS";
        if (src === "slickdeals") return "Slickdeals";
        return "OzBargain";
      }

      function pickCategoryAccent(category) {
        const key = (category || "").toLowerCase();
        if (key.includes("shoe")) return "#fb923c";
        if (key.includes("gaming") || key.includes("game")) return "#c084fc";
        if (key.includes("food")) return "#f97316";
        if (key.includes("tech") || key.includes("comput")) return "#22d3ee";
        if (key.includes("fashion")) return "#f472b6";
        if (key.includes("beauty")) return "#f9a8d4";
        if (key.includes("education") || key.includes("book")) return "#a78bfa";
        if (key.includes("travel")) return "#34d399";
        if (key.includes("sport")) return "#4ade80";
        return "#60a5fa";
      }

      function svgPreview(deal) {
        const accent = pickCategoryAccent(deal.category);
        const cat = (deal.category || "General").replace(/&/g, "&amp;");
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#000"/><rect x="40" y="40" width="1120" height="620" rx="28" fill="#050505" stroke="${accent}" stroke-opacity="0.55"/><text x="90" y="250" font-family="Inter,Arial,sans-serif" font-size="40" fill="#a1a1aa">${cat}</text><text x="90" y="345" font-family="Inter,Arial,sans-serif" font-size="84" font-weight="700" fill="#f5f5f5">FREEBIE</text></svg>`;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function imageForDeal(deal) {
        const image = deal.image_url || "";
        const isGoodRemote = image.startsWith("http") && !image.includes("localhost") && !image.includes("127.0.0.1");
        if (state.svgOnly) return svgPreview(deal);
        return isGoodRemote ? image : svgPreview(deal);
      }

      function cardTemplate(deal, expired = false) {
        const image = imageForDeal(deal);
        const title = formatDealTitle(deal);
        const cardTone = expired ? "opacity-30 saturate-0 brightness-75" : "brightness-110";
        const src = deal.source || "ozbargain";
        const dt = deal.deal_type === "free" ? "Free" : "Discount";
        const dl = deal.discount_label ? `<p class="mt-1 text-xs text-cyan-200/90">${deal.discount_label}</p>` : "";
        const voteOrDeal = (deal.votes || 0) > 0 ? `🔥 ${deal.votes}` : `<span class="text-amber-200/80">${dt}</span>`;
        const newBadge = deal.is_new
          ? '<span class="absolute bottom-2 left-2 rounded-full border border-emerald-400/40 bg-emerald-500/25 px-2 py-0.5 text-[10px] text-emerald-100">New</span>'
          : "";
        return `<a href="${deal.link}" target="_blank" rel="noopener noreferrer" class="deal-card group panel block min-w-0 overflow-hidden rounded-2xl transition-all duration-300 hover:-translate-y-1 ${cardTone}"><div class="relative"><img src="${image}" alt="" class="h-40 w-full object-cover sm:h-48"/><span class="absolute left-2 top-2 max-w-[55%] truncate rounded-full border border-white/20 bg-black/70 px-2 py-1 text-[10px] sm:left-3 sm:top-3 sm:max-w-[50%] sm:px-3 sm:text-xs">${deal.category || "General"}</span><span class="absolute right-2 top-2 max-w-[45%] truncate rounded-full border border-violet-400/35 bg-violet-950/70 px-2 py-1 text-[9px] text-violet-100 sm:text-[10px]">${sourceLabel(src)}</span>${newBadge}${expired ? '<span class="absolute bottom-2 right-2 rounded-full border border-zinc-500/40 bg-zinc-700/50 px-2 py-1 text-[10px] text-zinc-300 sm:bottom-3 sm:right-3 sm:px-3 sm:text-xs">Expired</span>' : ""}</div><div class="p-3 sm:p-4"><div class="flex flex-wrap gap-1.5"><span class="rounded-md border border-white/15 bg-white/5 px-2 py-0.5 text-[10px] uppercase tracking-wide text-zinc-300">${dt}</span></div><h3 class="mt-2 text-sm font-semibold leading-snug sm:min-h-[3rem] sm:text-base">${title}</h3>${dl}<div class="mt-3 flex flex-col gap-2 sm:mt-4 sm:flex-row sm:items-center sm:justify-between"><span class="order-2 break-words text-xs text-zinc-400 sm:order-1 sm:max-w-[60%] sm:text-sm">${deal.posted_at ? new Date(deal.posted_at).toLocaleString() : "No date"}</span><span class="order-1 inline-flex w-fit shrink-0 rounded-lg border border-amber-400/30 bg-amber-500/10 px-3 py-1.5 text-sm text-amber-300 sm:order-2">${voteOrDeal}</span></div></div></a>`;
      }

      function renderCategories() {
        const base = [...new Set(state.deals.map((d) => d.category || "General"))].sort((a, b) => a.localeCompare(b));
        const categories = ["All", "🔥 HOT", "✨ New", ...base];
        categoryBar.innerHTML = categories.map((category) => {
          const selected = category === state.selectedCategory;
          return `<button type="button" data-category="${category}" class="min-h-[40px] max-w-full truncate rounded-full border px-3 py-2 text-xs transition sm:px-4 sm:text-sm ${selected ? "border-white bg-white/20 text-white" : "border-white/20 bg-black/40 text-zinc-300 hover:border-white/40"}">${category}</button>`;
        }).join("");
      }

      function filteredAndSortedDeals() {
        const active = state.deals.filter((d) => !d.is_expired).filter((d) => {
          const locations = Array.isArray(d.locations) ? d.locations : [];
          if (state.selectedLocation === "ALL") return true;
          if (locations.length === 0) return true;
          return locations.includes(state.selectedLocation);
        });
        let byCategory = active;
        if (state.selectedCategory === "🔥 HOT") byCategory = [...active].sort((a, b) => (b.votes || 0) - (a.votes || 0)).slice(0, 10);
        else if (state.selectedCategory === "✨ New") byCategory = active.filter((d) => d.is_new);
        else if (state.selectedCategory !== "All") byCategory = active.filter((d) => (d.category || "General") === state.selectedCategory);

        let out = byCategory;
        if (state.selectedSource !== "ALL") out = out.filter((d) => (d.source || "ozbargain") === state.selectedSource);
        out = out.filter((d) => (d.votes || 0) >= state.minVotes);
        out = out.filter((d) =>
          `${d.title || ""} ${d.category || ""} ${d.discount_label || ""} ${d.source || ""}`.toLowerCase().includes(state.query)
        );
        if (state.sortBy === "newest") out.sort((a, b) => new Date(b.posted_at || 0) - new Date(a.posted_at || 0));
        if (state.sortBy === "oldest") out.sort((a, b) => new Date(a.posted_at || 0) - new Date(b.posted_at || 0));
        if (state.sortBy === "votes_asc") out.sort((a, b) => (a.votes || 0) - (b.votes || 0));
        if (state.sortBy === "votes_desc") out.sort((a, b) => (b.votes || 0) - (a.votes || 0));
        if (state.sortBy === "title_asc") out.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
        if (state.sortBy === "category_asc") out.sort((a, b) => (a.category || "General").localeCompare(b.category || "General"));
        return out;
      }

      function renderDeals() {
        const visibleDeals = filteredAndSortedDeals();
        dealsGrid.innerHTML = visibleDeals.map((d, idx) => cardTemplate(d, false).replace("deal-card", `deal-card" style="animation-delay:${Math.min(idx * 40, 380)}ms`)).join("");
        emptyState.classList.toggle("hidden", visibleDeals.length > 0);

        const expired = state.deals
          .filter((d) => d.is_expired)
          .filter((d) => {
            const locations = Array.isArray(d.locations) ? d.locations : [];
            if (state.selectedLocation === "ALL") return true;
            if (locations.length === 0) return true;
            return locations.includes(state.selectedLocation);
          })
          .filter((d) => state.selectedSource === "ALL" || (d.source || "ozbargain") === state.selectedSource);
        expiredGrid.innerHTML = expired
          .sort((a, b) => new Date(b.posted_at || 0) - new Date(a.posted_at || 0))
          .map((d) => cardTemplate(d, true))
          .join("");

        const status = state.scrapeStatus || {};
        const lastRun = status.last_scraped_at ? new Date(status.last_scraped_at).toLocaleTimeString() : "n/a";
        const line1 = `${visibleDeals.length} shown · ${state.deals.length} total`;
        const oz = status.scraped_ozbargain;
        const sb = status.scraped_studentbeans;
        const ud = status.scraped_unidays;
        const sd = status.scraped_slickdeals;
        const breakdown =
          oz != null && sb != null && ud != null && sd != null
            ? ` · Oz ${oz} · Beans ${sb} · UNiDAYS ${ud} · SD ${sd}`
            : oz != null && sb != null && ud != null
              ? ` · Oz ${oz} · Beans ${sb} · UNiDAYS ${ud}`
              : "";
        const line2 = `Last scrape: ${lastRun} · Scraped: ${status.scraped_count ?? "n/a"}${breakdown} · New: ${status.new_count ?? "n/a"}`;
        const line3 = "Auto refresh: every 15 min";
        statsText.innerHTML = `<span class="block sm:inline">${line1}</span><span class="mx-1 hidden sm:inline"> | </span><span class="block sm:inline">${line2}</span><span class="mx-1 hidden sm:inline"> | </span><span class="block sm:inline">${line3}</span>`;
      }

      function renderTabUI() {
        const isHome = state.activeTab === "home";
        homePanel.classList.toggle("hidden", !isHome);
        dealsPanel.classList.toggle("hidden", isHome);
        topTabs.querySelectorAll("button[data-tab]").forEach((btn) => {
          btn.classList.toggle("text-white", btn.dataset.tab === state.activeTab);
          btn.classList.toggle("text-zinc-300", btn.dataset.tab !== state.activeTab);
        });
      }

      categoryBar.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-category]");
        if (!button) return;
        state.selectedCategory = button.dataset.category;
        renderCategories();
        renderDeals();
      });
      searchInput.addEventListener("input", (event) => { state.query = event.target.value.trim().toLowerCase(); renderDeals(); });
      minVotesSelect.addEventListener("change", (event) => { state.minVotes = Number(event.target.value || 0); renderDeals(); });
      sortSelect.addEventListener("change", (event) => { state.sortBy = event.target.value; renderDeals(); });
      svgOnlyToggle.addEventListener("change", (event) => { state.svgOnly = event.target.checked; renderDeals(); });
      locationSelect.addEventListener("change", (event) => { state.selectedLocation = event.target.value; renderDeals(); });
      sourceSelect.addEventListener("change", (event) => { state.selectedSource = event.target.value; renderDeals(); });

      topTabs.addEventListener("click", (event) => {
        const btn = event.target.closest("button[data-tab]");
        if (!btn) return;
        state.activeTab = btn.dataset.tab;
        renderTabUI();
      });

      async function initialize() {
        try {
          const [dealsResponse, statusResponse] = await Promise.all([fetch("/deals.json"), fetch("/scrape-status")]);
          state.deals = await dealsResponse.json();
          state.scrapeStatus = await statusResponse.json();
          renderCategories();
          renderDeals();
        } catch (error) {
          emptyState.classList.remove("hidden");
          emptyState.textContent = "Unable to load deals.json. Run scraper.py first.";
        }
        renderTabUI();
      }

      initialize();
    </script>
  </body>
</html>
